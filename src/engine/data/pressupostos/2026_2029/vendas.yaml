# Drivers de crescimento de vendas 2026-2029 — SPREADS REAIS (Filosofia B)
#
# taxa_nominal = (1 + inflação_ano) × (1 + spread_real) − 1
#
# Inflação por ano (de macro.yaml): 2026=2.0%, 2027=1.8%, 2028=1.7%, 2029=1.6%
#
# Exemplo: spread_real=0.010 em 2026 → nominal = 1.02×1.010−1 ≈ 3.0%

crescimento_volume_vendas:
  # Volume é grandeza física — valor directo (não ligado à inflação)
  2026: 0.03
  2027: 0.03
  2028: 0.03
  2029: 0.03

pvu_produto_crescimento:
  # Spread real de PVU por produto
  # 2026: 1.0% real → ~3.0% nominal | 2027: 1.2% → ~3.0% | 2028: 1.3% → ~3.0% | 2029: 1.4% → ~3.0%
  Pratos:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014
  Tigelas:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014
  Canecas:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014
  Pecas_Servir:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014
  Forno_Cozinha:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014

pvu_mercadorias_crescimento:
  # Spread real de PVU de mercadorias
  Cutelaria:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014
  Vidros_Cristais:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014
  Texteis_Acessorios:
    2026: 0.010
    2027: 0.012
    2028: 0.013
    2029: 0.014

crescimento_pvu_vendas:
  # Spread real de preço agregado (pricing power)
  2026: 0.010
  2027: 0.012
  2028: 0.013
  2029: 0.014
