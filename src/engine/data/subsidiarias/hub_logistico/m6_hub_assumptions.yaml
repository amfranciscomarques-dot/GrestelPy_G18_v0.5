# Hub Logístico 4.0 — Costa Nova (Vagos) — pressupostos M6
#
# Vetores tecnológicos: VLMs (6 módulos) + AMRs (5 unidades) + Box-on-Demand
#   + WMS integrado + Digital Twin + Solar 200 kWp — interligados via MES/WMS
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  JUSTIFICAÇÃO DO CAPEX DE 6 000 k€                                  │
# │  CAPEX / ATL = 6 000 k€ / 39 700 k€ = 15,1 % ≥ 15 % (mínimo PEF)  │
# │  O projeto integra as fases 1 e 2 numa única decisão de investimento │
# │  para cumprir o limiar mínimo de relevância estratégica do M6.       │
# └─────────────────────────────────────────────────────────────────────┘
#
# CAPEX por componente (fases 1+2 integradas):
#   Terreno / preparação (Lote 29 ZI Vagos já detido pela Grestel)   100 k€ –  200 k€
#   Construção civil (reabilitação G1 + cais de carga + infraest.)  2 100 k€ – 2 700 k€
#   Honorários e licenças                                               85 k€ –  165 k€
#   6 módulos VLM (14 m) — scale-up de 4 para 6                     1 800 k€ – 2 250 k€
#   5 AMRs + suporte (fases 1+2 integradas)                            550 k€ –  750 k€
#   Estações pick-and-pack + Box-on-Demand                             600 k€ –  850 k€
#   WMS + MES + Digital Twin (integrado em vez de deferido)            400 k€ –  600 k€
#   Solar 200 kWp + bateria 50 kWh (escala 1→2)                        220 k€ –  320 k€
#   Integração / formação (escopo ampliado)                             250 k€ –  400 k€
#   Total adoptado (fases 1+2)                                       6 000 k€

incluir_hub: true

projeto_hub:
  capex:
    base: 6000000
    cronograma:
      2025: 3000000  # 50 % — obras civis + reabilitação G1 + cais + infra eléctrica/PV
      2026: 3000000  # 50 % — VLMs×6 + AMRs×5 + WMS + Digital Twin + Box-on-Demand + Solar
    # Depreciação por pool de ativo (DR 25/2009) — montantes somam ao base
    # Nota: novos pools (box_on_demand, energia_solar) são lidos dinamicamente
    #       pelo engine via pools.values() — nenhuma alteração de código necessária.
    pools:
      construcao_civil:
        descricao: "Reabilitação G1 + estrutura metálica + cais de carga + honorários + preparação"
        montante: 2700000
        ano_inicio: 2025
        taxa_depreciacao: 0.04    # vida útil 25 anos
        vida_util_anos: 25
      integracao_formacao:
        descricao: "Integração de sistemas e formação inicial (escopo ampliado fases 1+2)"
        montante: 300000
        ano_inicio: 2025
        taxa_depreciacao: 0.33    # vida útil 3 anos (OAI — outros ativos intangíveis)
        vida_util_anos: 3
      vlm:
        descricao: "6 módulos VLM 14 m — scale-up de 4 para 6 módulos"
        montante: 1305000
        ano_inicio: 2026
        taxa_depreciacao: 0.125   # vida útil 8 anos
        vida_util_anos: 8
      robotica_amr:
        descricao: "5 AMRs + estações pick-and-pack (fases 1+2 integradas)"
        montante: 625000
        ano_inicio: 2026
        taxa_depreciacao: 0.20    # vida útil 5 anos
        vida_util_anos: 5
      wms_software:
        descricao: "WMS integrado + MES analytics layer"
        montante: 450000
        ano_inicio: 2026
        taxa_depreciacao: 0.25    # vida útil 4 anos
        vida_util_anos: 4
      box_on_demand:
        descricao: "Sistema Box-on-Demand — corte e embalagem automatizada (integrado fase 1)"
        montante: 350000
        ano_inicio: 2026
        taxa_depreciacao: 0.20    # vida útil 5 anos
        vida_util_anos: 5
      energia_solar:
        descricao: "Painéis solares 200 kWp + bateria 50 kWh (escala de 100 kWp)"
        montante: 270000
        ano_inicio: 2026
        taxa_depreciacao: 0.05    # vida útil 20 anos (DGEG: 20-25 a)
        vida_util_anos: 20
    # Verificação: 2 700 + 300 + 1 305 + 625 + 450 + 350 + 270 = 6 000 k€

  ano_inicio_beneficios: 2026

  financiamento:
    Banco_Hub:
      montante: 4500000         # 75 % do CAPEX — CGD / BPI, prazo 10 anos
      taxa_juro: 0.0415
      amortizacao_anual: 450000
      inicio_amortizacao: 2028  # carência 3 anos: 2025-26 obra + 2027 ramp-up
      desembolso: 2025
    PT2030:
      montante: 2700000         # subsídio não reembolsável (45 % do CAPEX — majoração REGIOSTARS 2024)
      ano_recebimento: 2027     # aprovação esperada após arranque operacional

  beneficios_anuais:
    # Poupança operacional = fases 1+2: 6 VLMs + 5 AMRs + Box-on-Demand
    #   68 % pessoal (não reposição atrito natural + eficiência batch-picking)
    #   32 % FSE (externalização logística eliminada + energia líquida)
    poupanca_operacional: 480000  # fase 1: 380 k€ + fase 2: +100 k€ (2 AMRs adicionais + Box-on-Demand)
    reducao_quebras: 80000        # Box-on-Demand corte preciso elimina desperdício embalagem (+30 k€)
    opex_incremental: 160000      # manutenção (5 AMRs + 6 VLMs + Digital Twin) líq. de PV 200 kWp
    # opex_incremental cresce à mesma taxa anual que os benefícios (crescimento_anual)

    beneficio_liquido_anual: 400000  # poupanca_operacional + reducao_quebras - opex_incremental

    # ---------------------------------------------------------------------------
    # JUSTIFICAÇÃO DO CRESCIMENTO REAL DE 2 % a.a. (componente real do nominal 4 %)
    # ---------------------------------------------------------------------------
    # O crescimento_anual de 4 % é nominal: 2 % inflação esperada + 2 % crescimento real.
    # O crescimento real de 2 % é conservador e justifica-se por quatro vetores:
    #
    # 1. COERÊNCIA INSTITUCIONAL
    #    A Grestel usa 2 % de crescimento na perpetuidade nos seus testes de imparidade
    #    de goodwill e avaliações de ativos de longo prazo. Adotar o mesmo valor garante
    #    consistência interna com os pressupostos corporativos do grupo.
    #
    # 2. ALAVANCAGEM OPERACIONAL DOS SISTEMAS DE IA (Hub 4.0)
    #    • 6 VLMs + 5 AMRs permitem gerir +200 % de SKUs sem aumento de headcount →
    #      cada euro de crescimento incremental tem margem de contribuição crescente.
    #    • Visão IA no picking reduz taxa de erro para < 0,5 % → menos devoluções e
    #      custos de logística inversa, sustentando os benefícios líquidos projetados.
    #
    # 3. VANTAGEM COMPETITIVA NO FULFILLMENT
    #    Redução do prazo de entrega de 3-5 dias para 24-48 h habilita os canais B2C e
    #    hotelaria premium (Horeca). O mercado global de «Premium Ceramic Ware» cresce a
    #    CAGR 6,8 % — os 2 % reais são, portanto, uma meta de captura conservadora.
    #
    # 4. EFEITO DE LIBERTAÇÃO E REINVESTIMENTO DE CAPITAL
    #    O WMS+Digital Twin centralizado reduz o Período Médio de Inventário,
    #    libertando €2,5 M de capital imobilizado (ver beneficios_pontuais abaixo).
    #    Este capital pode ser canalizado para marketing e inovação, alimentando o
    #    crescimento incremental ao longo do horizonte de 10 anos.
    #
    # DECOMPOSIÇÃO DO CRESCIMENTO REAL DE 2 %:
    #   • ~1 % — poder de pricing (ajuste à inflação em canais premium/B2C)
    #   • ~1 % — ganho de quota de mercado via superioridade logística e digital
    # ---------------------------------------------------------------------------
    crescimento_anual: 0.04          # crescimento nominal composto a partir do ano 3 (2 % inflação + 2 % real)

  beneficios_pontuais:
    libertacao_inventario: 2500000  # WMS+Digital Twin; 13 M€ em stock → meta de 19 % (vs 15 % fase 1)
    ano: 2026

  # ---------------------------------------------------------------------------
  # BENEFÍCIOS COMERCIAIS — Acréscimo de VN por canais diretos habilitados pelo Hub
  # ---------------------------------------------------------------------------
  # Fonte: relatório estratégico Grestel → +€0,5M–€1,1M/ano a partir de 2026.
  # Mecanismos (fase 1+2 integradas):
  #   • Fulfillment 24-48h → habilita B2C e hotelaria premium (Horeca)
  #   • +200% SKUs geridos (6 VLMs) → expansão de coleções e mercados
  #   • Box-on-Demand → embalagem premium gift → +18pp margem canal direto
  #   • Digital Twin + MES → previsão de procura → menos stock-outs → mais vendas
  #   • Logística a terceiros (Fase 2): serviços a produtores cerâmicos da região
  # ---------------------------------------------------------------------------
  beneficios_comerciais:
    ano_inicio: 2026
    vn_incremental:
      2026: 500000    # Hub ampliado: 6 VLMs desde dia 1 → maior capacidade B2C arranque
      2027: 900000    # Box-on-Demand + embalagem premium → encomendas hotelaria consolidadas
      2028: 1100000   # + serviços logísticos a terceiros (~300 k€); Digital Twin: menos rupt.
      2029: 950000    # estabilização (efeito base maior, crescimento incremental cede)
    cmvmc_pct_incremental: 0.55  # custo direto ~55% VN → margem bruta incremental ~45%
    usd_fraction: 0.15            # 15 % do VN incremental denominado em USD (B2C internacional / EUA)

  # ---------------------------------------------------------------------------
  # NECESSIDADES DE FUNDO DE MANEIO (NFM) — Ciclo de Exploração do Hub
  # ---------------------------------------------------------------------------
  necessidades_fundo_maneio:
    stock_manutencao_inicial: 46000
    consumiveis_arranque: 5000
    psp_fornecedores_dias: 30
    compras_manutencao_anuais: 48000  # ≈ 40 % × 120 k€ OPEX incremental
    pmr_clientes_externos_dias: 45
    receita_servicos_externos_2028: 300000   # fase 2 integrada → arranque mais robusto
    crescimento_servicos_anuais: 0.25        # 25 %/ano → ~5 % VN Grestel até 2029
    ano_inicio: 2026

  # ---------------------------------------------------------------------------
  # JUROS CAPITALIZÁVEIS — NCRF 10 (Custos de Empréstimos Obtidos)
  # ---------------------------------------------------------------------------
  juros_capitalizaveis:
    capitalizar: true
    ano_inicio_capitalizacao: 2025
    ano_fim_capitalizacao: 2025   # 2026: comissionamento e arranque → despesa

  # ---------------------------------------------------------------------------
  # CRONOGRAMA MENSAL — Base Mensal M6 (1.º exercício económico)
  # ---------------------------------------------------------------------------
  cronograma_mensal:
    # 2025 — Fase de construção civil ampliada (total: 3 000 k€)
    # Perfil: mobilização → pico (G1 + cais de carga + infra elétrica ampliada) → conclusão
    "2025":
      jan: 110000   # mobilização de obra + estaleiro (escopo ampliado)
      fev: 110000
      mar: 110000
      abr: 330000   # pico: obras civis + estrutura metálica + cais de carga
      mai: 330000
      jun: 330000
      jul: 330000
      ago: 210000   # agosto: menor cadência (feriados indústria construção)
      set: 330000   # retoma: impermeabilizações + pavimento técnico + charging infra AMRs
      out: 330000
      nov: 270000   # infraestrutura elétrica ampliada (200 kWp PV — preparação)
      dez: 210000   # conclusão, aprovação e receção provisória
    # Verificação: 110×3 + 330×4 + 210 + 330×2 + 270 + 210 = 3 000 k€

    # 2026 — Fase de equipamento completa — fases 1+2 integradas (total: 3 000 k€)
    # H1: VLMs×6 + AMRs×5 + WMS/MES; H2: Box-on-Demand + Digital Twin + Solar
    "2026":
      jan: 0        # aguarda receção provisória obra civil
      fev: 350000   # receção e montagem módulos VLM (6 módulos × ~218 k€)
      mar: 350000
      abr: 500000   # 5 AMRs + estações pick-and-pack (fases 1+2)
      mai: 500000   # WMS integrado + MES analytics layer + integração ERP
      jun: 300000   # testes UAT + comissionamento VLMs e AMRs
      jul: 350000   # Box-on-Demand: receção, instalação e testes de carga
      ago: 350000   # Digital Twin: hardware + licenças + integração MES
      set: 200000   # energia solar: painéis 200 kWp + bateria 50 kWh + instalação
      out: 100000   # formação alargada (Digital Twin + Box-on-Demand) + ajustes finais
      nov: 0
      dez: 0
    # Verificação: 350×2 + 500×2 + 300 + 350×2 + 200 + 100 = 3 000 k€

  opex_detalhe:
    total: 160000  # alinhado com opex_incremental acima
    energia:
      consumo_liquido_kwh: 80000   # bruto ~160k kWh − offset geração PV 200 kWp ~80k kWh
      preco_kwh_base: 0.12          # OMIE médio 2024 (€/kWh, líquido de tarifas)

  rfai:
    # Regime Fiscal de Apoio ao Investimento — CFI art. 22.º-23.º
    # Crédito de imposto dedutível directamente à colecta de IRC.
    # Gerado sobre o CAPEX elegível realizado em 2025-2026.
    #
    # Taxa aplicável (art. 23.º §1 al. b) CFI):
    #   10 % para investimentos em regiões assistidas (Centro/Aveiro).
    #
    # CAPEX elegível adoptado = CAPEX base total (6 000 k€).
    # Crédito total gerado: 10 % × 6 000 k€ = 600 k€.
    # CAPEX/ATL = 6 000 k€ / 39 700 k€ = 15,1 % ≥ 15 % (limiar mínimo PEF).
    #
    # Limites (art. 23.º §6 CFI):
    #   • Máximo anual: 50 % do IRC liquidado no exercício pela empresa
    #   • Carry-forward: saldo não utilizado transportável até 10 exercícios
    aplicar: true
    taxa: 0.10
    capex_elegivel: 6000000
    limite_irc_pct: 0.50
    carry_forward_anos: 10

  viabilidade:
    # Fluxos nominais (preços correntes) — WACC nominal 8 % (Fisher).
    wacc: 0.08
    # Taxa combinada IRC: 20,0 % + 1,5 % derrama municipal + 3,0 % derrama estadual = 24,5 %
    irc_taxa: 0.245
    eur_usd_base: 1.08
    horizonte_anos: 10
