# Drivers de crescimento de vendas para 2025.
#
# Formato suportado por variável:
#   base_2025: <taxa anual>          ← obrigatório; distribui-se automaticamente pelos 12 meses
#   acrescimos_mensais:              ← opcional; adicionar apenas os meses que desviam da base
#     Mai: +0.01
#     Set: -0.01
#
# Taxa efectiva de cada mês = (1 + base_2025)^(1/12) - 1 + acrescimo_mes
# Taxa anual efectiva       = produto dos 12 factores mensais - 1

crescimento_volume_vendas:
  base_2025: 0.03
