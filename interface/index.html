<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grestel · PEF G18 M6</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Warm-neutral, low-saturation palette */
    --bg: oklch(94.38% 0.00446 77.998);
    --surface: oklch(0.995 0.003 85);
    --surface-2: oklch(0.975 0.005 85);
    --ink: oklch(0.22 0.012 250);
    --ink-2: oklch(0.32 0.012 250);
    --muted: oklch(0.55 0.010 250);
    --faint: oklch(0.78 0.008 90);
    --faint-strong: oklch(0.70 0.012 80);
    --rule: oklch(0.92 0.005 85);
    --rule-strong: oklch(0.86 0.008 85);

    /* Single accent (sober teal) */
    --accent: oklch(0.55 0.10 175);
    --accent-soft: oklch(0.92 0.04 175);

    /* Signal colors — desaturated */
    --pos: oklch(0.55 0.12 145);
    --neg: oklch(0.55 0.16 30);
    --pos-soft: oklch(0.94 0.04 145);
    --neg-soft: oklch(0.94 0.05 30);

    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --ui: "Helvetica Neue", Helvetica, "Segoe UI", system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--ui);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-variant-numeric: tabular-nums;
  }
  .mono { font-family: var(--mono); font-feature-settings: "tnum" 1, "calt" 0; }

  /* ------------------------- Shell ------------------------- */
  .app {
    display: grid;
    grid-template-columns: 232px 1fr;
    height: 100vh;
    min-height: 100vh;
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 18px 16px;
    border-bottom: 1px solid var(--rule);
  }
  .brand-mark {
    width: 32px; height: 32px;
    background: var(--ink);
    color: var(--surface);
    display: grid; place-items: center;
    font-weight: 600;
    font-family: var(--ui);
    font-size: 15px;
    letter-spacing: -0.02em;
  }
  .brand-name {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .brand-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .nav {
    padding: 14px 12px;
    overflow-y: auto;
    flex: 1;
  }
  .nav-group + .nav-group { margin-top: 16px; }
  .nav-label {
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 0 8px 6px;
    font-weight: 500;
  }
  .nav-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: 0;
    padding: 6px 10px;
    font: inherit;
    color: var(--ink-2);
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--ink); }
  .nav-item.is-active {
    background: var(--ink);
    color: var(--surface);
    font-weight: 500;
  }

  .sidebar-foot {
    border-top: 1px solid var(--rule);
    padding: 12px 18px;
    font-size: 11px;
    color: var(--muted);
  }
  .foot-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
  .foot-row .mono { color: var(--ink-2); }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot--ok { background: var(--pos); }
  .dot--err { background: var(--neg); }
  .dot--warn { background: oklch(0.75 0.15 75); }

  .main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* ------------------------- Topbar ------------------------- */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
    gap: 16px;
  }
  .topbar-l { min-width: 0; }
  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .crumb-muted { color: var(--muted); }
  .crumb-sep { color: var(--faint-strong); }
  .crumb { color: var(--ink); font-weight: 500; }
  .topbar-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    max-width: 680px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .topbar-r { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .seg {
    display: inline-flex;
    border: 1px solid var(--rule-strong);
    background: var(--surface);
    padding: 2px;
  }
  .seg-btn {
    appearance: none;
    background: none;
    border: 0;
    padding: 4px 10px;
    font: inherit;
    font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    font-weight: 500;
  }
  .seg-btn:hover { color: var(--ink); }
  .seg-btn.is-on {
    background: var(--ink);
    color: var(--surface);
  }
  .seg--sm .seg-btn { padding: 3px 8px; font-size: 11px; }

  .toggle {
    appearance: none;
    background: none;
    border: 1px solid var(--rule-strong);
    padding: 4px 10px 4px 6px;
    font: inherit;
    font-size: 12px;
    color: var(--ink-2);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-weight: 500;
  }
  .toggle-track {
    width: 24px;
    height: 14px;
    background: var(--rule-strong);
    border-radius: 7px;
    position: relative;
    transition: background 0.15s;
  }
  .toggle-thumb {
    position: absolute;
    top: 1px;
    left: 1px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--surface);
    transition: transform 0.15s;
  }
  .toggle.is-on .toggle-track { background: var(--accent); }
  .toggle.is-on .toggle-thumb { transform: translateX(10px); }

  .chip-static {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-2);
    background: var(--surface);
    border: 1px solid var(--rule-strong);
  }

  .btn-ghost {
    appearance: none;
    background: none;
    border: 1px solid var(--rule-strong);
    padding: 4px 10px;
    font: inherit;
    font-size: 12px;
    color: var(--ink-2);
    cursor: pointer;
    font-weight: 500;
  }
  .btn-ghost:hover { background: var(--surface); color: var(--ink); }

  /* ------------------------- Content area ------------------------- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ------------------------- KPI cards ------------------------- */
  .grid-kpis {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 12px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .grid-2-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

  @media (max-width: 1280px) {
    .grid-kpis { grid-template-columns: repeat(3, 1fr); }
    .grid-2-3 { grid-template-columns: 1fr; }
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--rule);
    padding: 12px 14px 10px;
  }
  .kpi--pos { border-color: var(--pos); border-top-width: 2px; }
  .kpi--neg { border-color: var(--neg); border-top-width: 2px; }
  .kpi-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .kpi-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
  .kpi-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .kpi-foot {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 6px;
    min-height: 16px;
  }
  .kpi-sub { color: var(--muted); font-size: 11px; }
  .delta {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 1px 5px;
  }
  .delta--pos { color: var(--pos); background: var(--pos-soft); }
  .delta--neg { color: var(--neg); background: var(--neg-soft); }

  /* ------------------------- Panel ------------------------- */
  .panel {
    background: var(--surface);
    border: 1px solid var(--rule);
  }
  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--rule);
    gap: 16px;
  }
  .panel-title { font-weight: 500; font-size: 14px; letter-spacing: -0.01em; color: var(--ink); }
  .panel-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .panel-right { flex-shrink: 0; }
  .panel-body { padding: 14px 16px; }
  .panel-body--flat { padding: 0; }

  /* ------------------------- Legends ------------------------- */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .legend-col { display: flex; flex-direction: column; gap: 4px; }
  .legend-col .legend-row { padding: 3px 0; justify-content: flex-start; gap: 10px; }
  .legend-col .legend-row .legend-label { flex: 1; color: var(--ink-2); }
  .legend-col .legend-row .legend-value { color: var(--ink); font-weight: 500; }
  .legend-value { color: var(--muted); }
  .legend-h { display: flex; gap: 14px; flex-wrap: wrap; row-gap: 6px; }
  .legend-h-item { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-2); }
  .legend-h-item .mono { color: var(--muted); }
  .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .legend-label { font-size: 12px; color: var(--ink-2); }

  /* ------------------------- Tables ------------------------- */
  .ftable {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .ftable--dense { font-size: 12px; }
  .ftable th, .ftable td {
    padding: 7px 12px;
    text-align: left;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }
  .ftable--dense th, .ftable--dense td { padding: 5px 10px; }
  .ftable th {
    font-weight: 500;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: var(--surface-2);
  }
  .ftable td.num, .ftable th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .ftable tr:hover td { background: var(--surface-2); }
  .ftable tr.is-bold td { font-weight: 500; color: var(--ink); }
  .ftable tr.is-subtotal td {
    background: var(--surface-2);
    border-top: 1px solid var(--rule-strong);
    font-weight: 500;
    color: var(--ink);
  }
  .ftable tr.is-total td {
    background: var(--surface-2);
    border-top: 2px solid var(--ink);
    font-weight: 600;
    color: var(--ink);
  }
  .ftable tr.is-section td {
    background: var(--surface-2);
    color: var(--ink);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding-top: 10px;
    padding-bottom: 6px;
  }
  .ftable tr.is-highlight td { background: var(--accent-soft); }
  .ftable .row-sep td {
    padding: 0;
    height: 6px;
    background: transparent;
    border: 0;
  }
  .ftable .neg { color: var(--neg); }
  .ftable .pos { color: var(--pos); }
  .muted { color: var(--muted); }

  /* ------------------------- Key-Value list ------------------------- */
  .kv {
    margin: 0;
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }
  .kv-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px dashed var(--rule);
    gap: 12px;
  }
  .kv-row:last-child { border-bottom: 0; }
  .kv-row dt {
    color: var(--ink-2);
    font-size: 12.5px;
    margin: 0;
  }
  .kv-row dd {
    margin: 0;
    color: var(--ink);
    font-size: 12.5px;
    text-align: right;
  }

  /* ------------------------- Donut row ------------------------- */
  .donut-row {
    display: flex;
    gap: 22px;
    align-items: center;
  }
  .donut-row > svg { flex-shrink: 0; }
  .donut-row > div:first-child { flex-shrink: 0; }
  .donut-row > .legend-col { flex: 1; }

  .sub-section { margin-top: 14px; }
  .sub-section + .sub-section { margin-top: 18px; }
  .sub-label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    font-weight: 500;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>

<script type="text/babel" src="views.jsx"></script>
