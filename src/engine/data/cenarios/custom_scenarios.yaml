cenario: Base
scenarios:

  # ---------------------------------------------------------------------------
  # NOTA: Filosofia B — spreads reais (Filosofia B)
  #
  # Todos os overrides de preços e custos abaixo são SPREADS REAIS.
  # O engine compõe a inflação em runtime: nominal = (1+inf)×(1+real)−1
  #
  # Volume é grandeza física — valores directos (não compostos com inflação).
  #
  # Conversão de referência:
  #   real = (1+nominal)/(1+inflação) − 1
  #   Inflações: 2025≈2.2%, 2026=2.0%, 2027=1.8%, 2028=1.7%, 2029=1.6%
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # BASE — Referência
  # Crescimento moderado e consistente com o histórico recente do sector
  # cerâmico português. Energia estabilizada após o choque 2022-2023.
  # Acordos salariais IRCT a ~3.5%. Mercados exportadores (USA/UE) estáveis.
  # ---------------------------------------------------------------------------
  Base:
    label: Base
    description: >
      Crescimento moderado alinhado com o sector cerâmico português:
      +3% volume, pricing power real +0.8%, custos em linha com a inflação.
    overrides: {}

  # ---------------------------------------------------------------------------
  # UPSIDE — "Expansão Export & Reposicionamento Premium"
  # ---------------------------------------------------------------------------
  Upside:
    label: Upside
    description: >
      Aceleração das exportações (USA/UE), crescimento do canal hotelaria
      e reposicionamento premium da gama: +4–4.5% volume, pricing power real
      +1.8%, FSE controlado por eficiência energética.
    overrides:
      crescimento_volume_vendas:
        base_2025: 0.045
        2026: 0.045
        2027: 0.040
        2028: 0.035
        2029: 0.030
      crescimento_pvu_vendas:
        # Spread real: 1.8% real + 2.2% inf ≈ 4.0% nom em 2025
        base_2025: 0.018
        2026: 0.015
        2027: 0.012
        2028: 0.013
        2029: 0.014
      crescimento_fse:
        # FSE controlado: spread real negativo em 2025 (eficiência energética)
        base_2025: -0.002
        2026: 0.005
        2027: 0.012
        2028: 0.013
        2029: 0.014
      crescimento_pessoal:
        # Spread real salarial moderado
        base_2025: 0.008
        2026: 0.010
        2027: 0.012
        2028: 0.013
        2029: 0.014

  # ---------------------------------------------------------------------------
  # DOWNSIDE — "Abrandamento Europeu & Pressão Asiática"
  # ---------------------------------------------------------------------------
  Downside:
    label: Downside
    description: >
      Estagnação da procura na UE, concorrência asiática no private label
      e incerteza tarifária USA: +1.5–2% volume, pricing power real negativo
      (preço não acompanha inflação), FSE e pessoal acima do base.
    overrides:
      crescimento_volume_vendas:
        base_2025: 0.015
        2026: 0.015
        2027: 0.020
        2028: 0.020
        2029: 0.025
      crescimento_pvu_vendas:
        # Spread real negativo — preço não acompanha inflação
        base_2025: -0.007
        2026: -0.005
        2027: 0.002
        2028: 0.003
        2029: 0.004
      crescimento_fse:
        # FSE com spread real positivo — pressão de custos estruturais
        base_2025: 0.018
        2026: 0.025
        2027: 0.031
        2028: 0.032
        2029: 0.033
      crescimento_pessoal:
        # Pressão salarial real acima do base
        base_2025: 0.018
        2026: 0.020
        2027: 0.022
        2028: 0.023
        2029: 0.024

  # ---------------------------------------------------------------------------
  # STRESS — "Crise Energética & Recessão Global"
  # ---------------------------------------------------------------------------
  Stress:
    label: Stress
    description: >
      Choque energético severo nos fornos (gás +80%), recessão global,
      colapso da hotelaria e fuga para fornecedores asiáticos:
      volume negativo em 2025, spread real de preço muito negativo (poder de
      fixação destruído), FSE com spread real muito elevado.
    overrides:
      crescimento_volume_vendas:
        base_2025: -0.030
        2026: -0.010
        2027: 0.015
        2028: 0.025
        2029: 0.030
      crescimento_pvu_vendas:
        # Spread real fortemente negativo — incapacidade de repercutir inflação
        base_2025: -0.017
        2026: -0.010
        2027: -0.003
        2028: 0.003
        2029: 0.009
      crescimento_fse:
        # Spread real muito elevado — choque energético muito acima da inflação geral
        base_2025: 0.096
        2026: 0.059
        2027: 0.041
        2028: 0.032
        2029: 0.024
      crescimento_pessoal:
        # Pressão IRCT intensa + salário mínimo
        base_2025: 0.027
        2026: 0.029
        2027: 0.022
        2028: 0.023
        2029: 0.024
