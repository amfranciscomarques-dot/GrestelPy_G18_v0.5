# Drivers de crescimento de custos 2026-2029 — SPREADS REAIS (Filosofia B)
#
# taxa_nominal = (1 + inflação_ano) × (1 + spread_real) − 1
#
# Inflação por ano (de macro.yaml): 2026=2.0%, 2027=1.8%, 2028=1.7%, 2029=1.6%

crescimento_fse:
  # Spread real de FSE
  # 2026: 1.0% real → ~3.0% nom | 2027: 1.2% → ~3.0% | 2028: 3.2% → ~5.0% | 2029: 3.3% → ~5.0%
  2026: 0.010
  2027: 0.012
  2028: 0.032
  2029: 0.033

crescimento_pessoal:
  # Spread real salarial (ganho acima da inflação)
  # 2026: 1.5% real → ~3.5% nom | 2027: 1.7% → ~3.5% | 2028: 1.3% → ~3.0% | 2029: 3.3% → ~5.0%
  2026: 0.015
  2027: 0.017
  2028: 0.013
  2029: 0.033

crescimento_custo_mercadorias:
  # Spread real de custo de mercadorias
  2026: 0.010
  2027: 0.012
  2028: 0.013
  2029: 0.014

crescimento_pcu_mpsc:
  # Spread real de PCU/MPSC
  2026: 0.010
  2027: 0.012
  2028: 0.013
  2029: 0.014
