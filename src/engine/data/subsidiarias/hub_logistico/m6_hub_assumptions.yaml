# Hub Logístico 4.0 — Costa Nova (Vagos) — pressupostos M6
#
# Vetores tecnológicos: VLMs (4 módulos) + AMRs (3 unidades fase 1) + Cobots
#   + WMS integrado — interligados via plataforma de gestão de armazém
#
# CAPEX fase 1 por componente (otimizado):
#   Terreno / preparação (Lote 29 ZI Vagos já detido pela Grestel)  100 k€ –  200 k€
#   Construção civil (reabilitação unidade G1, não nova)           1 000 k€ – 1 800 k€
#   Honorários e licenças                                             85 k€ –  165 k€
#   4 módulos VLM (14 m) — inalterado; core value driver           1 200 k€ – 1 500 k€
#   3 AMRs + suporte (fase 1 de 5; escalável c/ cash-flow)           390 k€ –  570 k€
#   Estações pick-and-pack                                           270 k€ –  420 k€
#   WMS integrado (Digital Twin deferido para fase 2)                200 k€ –  350 k€
#   Integração / formação                                            150 k€ –  300 k€
#   Total adoptado fase 1                                          3 800 k€
#
# Deferido fase 2 (~700 k€ – 1 000 k€): 2 AMRs + Box-on-Demand + Digital Twin

incluir_hub: true

projeto_hub:
  capex:
    base: 3800000
    cronograma:
      2025: 2280000  # 60 % — obras civis + reabilitação G1 + estrutura metálica
      2026: 1520000  # 40 % — VLMs + 3 AMRs + WMS
    # Depreciação por pool de ativo (DR 25/2009) — montantes somam ao base
    pools:
      construcao_civil:
        descricao: "Reabilitação G1 + estrutura metálica + honorários + preparação"
        montante: 2130000
        ano_inicio: 2025
        taxa_depreciacao: 0.04    # vida útil 25 anos
        vida_util_anos: 25
      integracao_formacao:
        descricao: "Integração de sistemas e formação inicial"
        montante: 150000
        ano_inicio: 2025
        taxa_depreciacao: 0.33    # vida útil 3 anos (OAI — outros ativos intangíveis)
        vida_util_anos: 3
      vlm:
        descricao: "4 módulos VLM 14 m — core value driver"
        montante: 870000
        ano_inicio: 2026
        taxa_depreciacao: 0.125   # vida útil 8 anos
        vida_util_anos: 8
      robotica_amr:
        descricao: "3 AMRs + estações pick-and-pack"
        montante: 375000
        ano_inicio: 2026
        taxa_depreciacao: 0.20    # vida útil 5 anos
        vida_util_anos: 5
      wms_software:
        descricao: "WMS integrado"
        montante: 275000
        ano_inicio: 2026
        taxa_depreciacao: 0.25    # vida útil 4 anos
        vida_util_anos: 4

  ano_inicio_beneficios: 2026

  financiamento:
    Banco_Hub:
      montante: 2850000         # 75 % do CAPEX — CGD / BPI, prazo 10 anos
      taxa_juro: 0.0415
      amortizacao_anual: 285000
      inicio_amortizacao: 2028  # carência 3 anos: 2025-26 obra + 2027 ramp-up
      desembolso: 2025
    PT2030:
      montante: 1710000         # subsídio não reembolsável (45 % do CAPEX — majoração REGIOSTARS 2024)
      ano_recebimento: 2027     # aprovação esperada após arranque operacional

  beneficios_anuais:
    # Poupança operacional = 68 % pessoal + 32 % FSE (externalização atual)
    poupanca_operacional: 380000  # conservador c/ 3 AMRs fase 1; pleno a partir do 3.º ano
    reducao_quebras: 50000        # ganho VLMs/picking (Box-on-Demand deferida para fase 2)
    opex_incremental: 120000      # custos recorrentes hub (manutenção, energia líq. de PV, IT)
    # opex_incremental cresce à mesma taxa anual que os benefícios (crescimento_anual)

    beneficio_liquido_anual: 310000  # poupanca_operacional + reducao_quebras - opex_incremental

    # ---------------------------------------------------------------------------
    # JUSTIFICAÇÃO DO CRESCIMENTO REAL DE 2 % a.a. (componente real do nominal 4 %)
    # ---------------------------------------------------------------------------
    # O crescimento_anual de 4 % é nominal: 2 % inflação esperada + 2 % crescimento real.
    # O crescimento real de 2 % é conservador e justifica-se por quatro vetores:
    #
    # 1. COERÊNCIA INSTITUCIONAL
    #    A Grestel usa 2 % de crescimento na perpetuidade nos seus testes de imparidade
    #    de goodwill e avaliações de ativos de longo prazo. Adotar o mesmo valor garante
    #    consistência interna com os pressupostos corporativos do grupo.
    #
    # 2. ALAVANCAGEM OPERACIONAL DOS SISTEMAS DE IA (Hub 4.0)
    #    • VLMs + AMRs permitem gerir +150 % de SKUs sem aumento de headcount (FTEs) →
    #      cada euro de crescimento incremental tem margem de contribuição crescente.
    #    • Visão IA no picking reduz taxa de erro para < 0,5 % → menos devoluções e
    #      custos de logística inversa, sustentando os benefícios líquidos projetados.
    #
    # 3. VANTAGEM COMPETITIVA NO FULFILLMENT
    #    Redução do prazo de entrega de 3-5 dias para 24-48 h habilita os canais B2C e
    #    hotelaria premium (Horeca). O mercado global de «Premium Ceramic Ware» cresce a
    #    CAGR 6,8 % — os 2 % reais são, portanto, uma meta de captura conservadora.
    #
    # 4. EFEITO DE LIBERTAÇÃO E REINVESTIMENTO DE CAPITAL
    #    O WMS centralizado reduz o Período Médio de Inventário (atualmente 312 dias),
    #    libertando €1,2M–€2,0M de capital imobilizado (ver beneficios_pontuais abaixo).
    #    Este capital pode ser canalizado para marketing e inovação, alimentando o
    #    crescimento incremental ao longo do horizonte de 10 anos.
    #
    # DECOMPOSIÇÃO DO CRESCIMENTO REAL DE 2 %:
    #   • ~1 % — poder de pricing (ajuste à inflação em canais premium/B2C)
    #   • ~1 % — ganho de quota de mercado via superioridade logística e digital
    # ---------------------------------------------------------------------------
    crescimento_anual: 0.04          # crescimento nominal composto a partir do ano 3 (2 % inflação + 2 % real)

  beneficios_pontuais:
    libertacao_inventario: 2000000  # WMS centralizado; 13 M€ em stock → meta conservadora de 15 %
    ano: 2026

  # ---------------------------------------------------------------------------
  # BENEFÍCIOS COMERCIAIS — Acréscimo de VN por canais diretos habilitados pelo Hub
  # ---------------------------------------------------------------------------
  # Fonte: relatório estratégico Grestel → +€0,4M–€0,8M/ano a partir de 2026.
  # Mecanismos:
  #   • Fulfillment 24-48h (vs. 3-5 dias atual) → habilita B2C e hotelaria premium
  #   • +150% SKUs geridos sem aumento de equipa → expansão de coleções
  #   • Mix-shift B2C elimina intermediários → +18pp margem canal direto
  # Nota: aplicado automaticamente em build_dr() quando hub_on=true.
  #       NÃO repetir em custom_scenarios.yaml (evitar dupla contagem).
  # cmvmc_pct_incremental: rácio de custo para vendas B2C adicionais (~55% VN,
  #   mesma estrutura de produto; a margem extra vem de PVU mais alto, não de
  #   custo mais baixo — consistente com benchmark B2C cerâmica premium).
  # ---------------------------------------------------------------------------
  beneficios_comerciais:
    ano_inicio: 2026
    vn_incremental:
      2026: 400000    # H2 2026 — arranque faseado; baixo do range €0,4M–€0,8M
      2027: 700000    # pleno: B2C consolidado + hotelaria premium + SKUs +150%
      2028: 800000    # + receita fase 2 serviços logísticos terceiros (~€200k)
      2029: 700000    # estabilização (efeito base maior, crescimento incremental cede)
    cmvmc_pct_incremental: 0.55  # custo direto ~55% VN → margem bruta incremental ~45%
    usd_fraction: 0.15            # 15 % do VN incremental denominado em USD (B2C internacional / EUA)

  # ---------------------------------------------------------------------------
  # NECESSIDADES DE FUNDO DE MANEIO (NFM) — Ciclo de Exploração do Hub
  # ---------------------------------------------------------------------------
  # Fundamento académico: NFM = Stock Operacional + Crédito a Clientes
  #                              − Crédito de Fornecedores
  # A variação anual da NFM (ΔNFM > 0 = saída de caixa) reduz o FCF livre
  # do projeto — Brealey, Myers & Allen, "Principles of Corporate Finance",
  # 13.ª ed., §11.2: «A project that requires an investment in working capital
  # generates a cash outflow in its early years.»
  #
  # Políticas contabilísticas Grestel aplicadas:
  #   • Inventários: custo de aquisição ou VRL, o mais baixo (NCRF 18 §9)
  #   • Contas a receber: custo amortizado — taxa de juro efetiva (NCRF 27 §11)
  #   • Rédito de serviços: reconhecido à medida que prestado (NCRF 20 §20)
  # ---------------------------------------------------------------------------
  necessidades_fundo_maneio:
    # --- Fase 1: Arranque operacional (2026) ---
    # Peças de substituição para VLMs, AMRs e WMS — benchmark ~3 % do CAPEX
    # de equipamento (1 520 k€); fonte: VDMA "Maintenance Cost Benchmarks 2022"
    stock_manutencao_inicial: 46000

    # Consumíveis de arranque: embalagens, etiquetas e materiais de packing
    # para comissionamento e testes de carga do sistema automatizado
    consumiveis_arranque: 5000

    # Crédito de fornecedores — contratos de manutenção anuais (VLMs+AMRs+WMS)
    # Prazo médio de pagamento típico em contratos de serviço de automação
    # ~40 % do OPEX incremental (120 k€) está em manutenção contratada
    psp_fornecedores_dias: 30
    compras_manutencao_anuais: 48000  # ≈ 40 % × 120 k€ OPEX incremental

    # --- Fase 2: Serviços logísticos a terceiros (arranque 2028) ---
    # Contas a receber por serviços a produtores cerâmicos externos (Aveiro/Coimbra)
    # PMR B2B logística nacional — inquérito APLOG 2023: mediana 45 dias
    pmr_clientes_externos_dias: 45
    receita_servicos_externos_2028: 200000   # ano 3 (arranque Fase 2)
    crescimento_servicos_anuais: 0.25        # 25 %/ano → ~5 % VN Grestel até 2029

    ano_inicio: 2026  # alinhado com ano_inicio_beneficios

  # ---------------------------------------------------------------------------
  # JUROS CAPITALIZÁVEIS — NCRF 10 (Custos de Empréstimos Obtidos)
  # ---------------------------------------------------------------------------
  # A NCRF 10 §8 exige a capitalização dos custos de empréstimos diretamente
  # atribuíveis à construção de ativos qualificáveis. O hub logístico qualifica
  # (período de construção substancial: 2025-2026). A capitalização cessa quando
  # o ativo está substancialmente pronto para uso.
  #
  # Tratamento:
  #   • DR 2025: juros NÃO reconhecidos como gasto financeiro — capitalizados
  #   • Balanço: AFT aumenta pelo juro capitalizado → maior base depreciável
  #   • DFC: juro é SEMPRE saída de caixa real (independente do trat. contab.)
  #   • VAL (unlevered): exclui juros pela natureza do FCF desalavancado;
  #     o efeito de capitalização surge indiretamente via depreciação mais alta
  #
  # Política conservadora: capitaliza apenas os juros do ano de construção civil
  # pura (2025). Em 2026, o ativo já gera benefícios → capitalização cessa.
  # ---------------------------------------------------------------------------
  juros_capitalizaveis:
    capitalizar: true
    ano_inicio_capitalizacao: 2025
    ano_fim_capitalizacao: 2025   # 2026: comissionamento e arranque → despesa

  # ---------------------------------------------------------------------------
  # CRONOGRAMA MENSAL — Base Mensal M6 (1.º exercício económico)
  # ---------------------------------------------------------------------------
  # O M6 exige base mensal para o 1.º ano de projeção (alinhado com Fase 1 do
  # M3), de modo a modelar corretamente:
  #   (a) Risco de liquidez dos juros da carência mês a mês
  #   (b) Momento exacto do "enchimento" da NFM (arranque da operação)
  #   (c) Recuperação de IVA sobre CAPEX (pagamento 1-3 meses antes do reembolso)
  # Os totais anuais coincidem com o cronograma anual (base de consistência M3/M6).
  # ---------------------------------------------------------------------------
  cronograma_mensal:
    # 2025 — Fase de construção civil (total: 2 280 k€)
    # Perfil: mobilização lenta → pico (obra+estrutura metálica) → desmobilização
    "2025":
      jan: 95000    # mobilização de obra + estaleiro
      fev: 95000
      mar: 95000
      abr: 280000   # pico: obras civis + estrutura metálica
      mai: 280000
      jun: 280000
      jul: 280000
      ago: 190000   # agosto: menor cadência (feriados indústria construção)
      set: 280000   # retoma: impermeabilizações + pavimento técnico
      out: 280000
      nov: 190000   # infraestrutura elétrica (+100 kWp PV)
      dez: 135000   # conclusão, aprovação e receção provisória
    # Verificação: soma = 95×3 + 280×5 + 190 + 280×2 + 190 + 135 = 2 280 k€

    # 2026 — Fase de equipamento e comissionamento (total: 1 520 k€)
    # H1: receção e montagem dos VLMs + AMRs + WMS; H2: arranque operacional
    "2026":
      jan: 0        # aguarda receção provisória obra civil
      fev: 250000   # receção e montagem módulos VLM (4 módulos × ~200 k€)
      mar: 250000
      abr: 380000   # 3 AMRs + estações pick-and-pack
      mai: 380000   # WMS integrado + integração ERP
      jun: 260000   # testes UAT + comissionamento final
      jul: 0        # arranque operacional faseado (operação paralela)
      ago: 0
      set: 0
      out: 0
      nov: 0
      dez: 0
    # Verificação: soma = 250×2 + 380×2 + 260 = 1 520 k€

  opex_detalhe:
    total: 120000  # alinhado com opex_incremental acima
    energia:
      consumo_liquido_kwh: 90000   # bruto ~130k kWh − offset geração PV ~40k kWh (100 kWp)
      preco_kwh_base: 0.12          # OMIE médio 2024 (€/kWh, líquido de tarifas)

  rfai:
    # Regime Fiscal de Apoio ao Investimento — CFI art. 22.º-23.º
    # Crédito de imposto dedutível directamente à colecta de IRC (não à matéria
    # colectável). Gerado sobre o CAPEX elegível realizado em 2025-2026.
    #
    # Taxa aplicável (art. 23.º §1 al. b) CFI):
    #   10 % para investimentos em regiões assistidas (Centro/Aveiro qualifica
    #   ao abrigo do art. 107.º §3 TFUE — auxílios de finalidade regional).
    #   Nota: a majoração de 25 % aplica-se apenas a regiões de baixa densidade
    #   classificadas nos termos do Decreto-Lei n.º 198/2018 — Vagos não consta.
    #
    # CAPEX elegível (art. 22.º §2 CFI):
    #   Activos tangíveis e intangíveis adquiridos/construídos no âmbito do projecto.
    #   A reabilitação de edifícios existentes (G1) qualifica quando visa
    #   a afectação a actividades produtivas (CFI art. 22.º §2 al. a)).
    #   Terrenos excluídos — aqui o lote é detido pela Grestel, logo CAPEX = 0.
    #   CAPEX elegível adoptado = CAPEX base total (3 800 k€).
    #
    # Limites (art. 23.º §6 CFI):
    #   • Máximo anual: 50 % do IRC liquidado no exercício pela empresa
    #   • Carry-forward: saldo não utilizado transportável até 10 exercícios
    #
    # Nota conservadora: o modelo aplica o limite de 50 % sobre o IRC
    # incremental do hub. Na prática, o limite incide sobre o IRC total da
    # Grestel (muito superior), pelo que a absorção real será mais rápida.
    aplicar: true
    taxa: 0.10
    capex_elegivel: 3800000
    limite_irc_pct: 0.50
    carry_forward_anos: 10

  viabilidade:
    # Coerência inflação/WACC (Fisher): fluxos a preços correntes (nominais).
    #   crescimento_anual de 4 % ≈ inflação esperada (~2 %) + crescimento real (~2 %).
    #   WACC de 8 % é nominal — consistente com fluxos nominais (Fisher: i_M ≈ i_R + π).
    #   Se os fluxos fossem reais (preços constantes), usaria WACC real ≈ 8 % − 2 % = 6 %.
    wacc: 0.08
    # Taxa combinada para FCF unlevered (taxa marginal do projecto):
    #   IRC geral (art. 87.º n.º 1 CIRC OE2024):    20,0 %
    #   Derrama Municipal (Vagos, máximo legal):       1,5 %
    #   Derrama Estadual (art. 87.º-A, 1.º escalão):  3,0 %
    #   Total:                                        24,5 %
    # O crédito RFAI é modelado separadamente em hub_rfai() — reduz o IRC
    # pago sem alterar a taxa base; ver secção rfai acima.
    irc_taxa: 0.245
    eur_usd_base: 1.08              # taxa EUR/USD de referência para o Monte Carlo
    # taxa_crescimento_terminal: 0.02  — não utilizado (ver nota abaixo)
    # Metodologia de Valor Residual (M6 — vida económica):
    #   O valor de saída é calculado como VLQ contabilístico dos ativos
    #   (NCRF 7) + recuperação da NFM acumulada, não como perpetuidade
    #   de Gordon. O projeto «cessa» financeiramente no final do horizonte.
    horizonte_anos: 10
